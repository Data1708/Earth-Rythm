<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Earth · Phase 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070d;
    --ink: #e8e6df;
    --ink-dim: #8a8478;
    --ink-faint: #4a4639;
    --accent: #d4a574;
    --line: rgba(232, 230, 223, 0.12);
    --display: 'Cormorant Garamond', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-weight: 300;
    cursor: default;
  }

  #scene {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* Subtle film grain overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  /* Header */
  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 28px 36px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
    pointer-events: none;
  }

  .title {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .title em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 8px;
  }

  .header-right {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    line-height: 1.8;
  }

  .header-right .clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.1em;
  }

  /* Footer with controls */
  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 28px 36px 32px;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
  }

  .controls > * { pointer-events: auto; }

  .speed-controls {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .speed-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .speed-buttons {
    display: flex;
    gap: 0;
    border: 1px solid var(--line);
    background: rgba(5, 7, 13, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .speed-btn {
    background: transparent;
    border: none;
    border-right: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s ease;
    min-width: 72px;
  }

  .speed-btn:last-child { border-right: none; }

  .speed-btn:hover {
    color: var(--ink);
    background: rgba(212, 165, 116, 0.05);
  }

  .speed-btn.active {
    color: var(--bg);
    background: var(--accent);
  }

  .speed-btn.active:hover {
    background: var(--accent);
  }

  /* Info panel - bottom right */
  .info-panel {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    line-height: 2.2;
    text-transform: uppercase;
  }

  .info-panel .value {
    color: var(--ink);
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  /* Decorative crosshairs at corners */
  .crosshair {
    position: fixed;
    width: 16px;
    height: 16px;
    z-index: 5;
    pointer-events: none;
  }

  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: var(--ink-faint);
  }

  .crosshair::before { width: 100%; height: 1px; top: 50%; }
  .crosshair::after { width: 1px; height: 100%; left: 50%; }

  .crosshair.tl { top: 80px; left: 36px; }
  .crosshair.tr { top: 80px; right: 36px; }
  .crosshair.bl { bottom: 100px; left: 36px; }
  .crosshair.br { bottom: 100px; right: 36px; }

  /* Loading state */
  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 50;
    transition: opacity 0.8s ease;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .loading.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Center vertical line decoration */
  .center-line {
    position: fixed;
    top: 80px;
    bottom: 100px;
    left: 50%;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--ink-faint) 20%, var(--ink-faint) 80%, transparent);
    opacity: 0.3;
    z-index: 1;
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<div class="loading" id="loading">Composing the Earth…</div>

<div class="crosshair tl"></div>
<div class="crosshair tr"></div>
<div class="crosshair bl"></div>
<div class="crosshair br"></div>
<div class="center-line"></div>

<div class="header">
  <div>
    <div class="title">A Living <em>Earth</em></div>
    <div class="subtitle">Phase I · The Quiet Globe</div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">—— UTC</div>
    <div id="date">——</div>
  </div>
</div>

<div class="controls">
  <div class="speed-controls">
    <div class="speed-label">Tempo</div>
    <div class="speed-buttons" id="speedButtons">
      <button class="speed-btn active" data-speed="1">Real</button>
      <button class="speed-btn" data-speed="3600">Hour/s</button>
      <button class="speed-btn" data-speed="86400">Day/s</button>
      <button class="speed-btn" data-speed="604800">Week/s</button>
      <button class="speed-btn" data-speed="31536000">Year/s</button>
    </div>
  </div>

  <div class="info-panel">
    <div>Sun Longitude · <span class="value" id="sunLon">——</span></div>
    <div>Sun Latitude · <span class="value" id="sunLat">——</span></div>
    <div>Tilt · <span class="value">23.44°</span></div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ---------------------------------------------------------------
// TIME CONTROLLER — central clock everything else subscribes to
// ---------------------------------------------------------------
class TimeController {
  constructor() {
    this.realStart = Date.now();
    this.simStart = Date.now();
    this.speed = 1;          // multiplier
    this.subscribers = [];
  }

  setSpeed(multiplier) {
    // Anchor sim time so transitions are seamless
    this.simStart = this.now();
    this.realStart = Date.now();
    this.speed = multiplier;
  }

  now() {
    const realElapsed = Date.now() - this.realStart;
    return this.simStart + realElapsed * this.speed;
  }

  date() {
    return new Date(this.now());
  }
}

const timeController = new TimeController();

// ---------------------------------------------------------------
// SCENE SETUP
// ---------------------------------------------------------------
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias: true,
  alpha: true,
  powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  35,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 0.4, 4.2);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.4;
controls.enablePan = false;
controls.minDistance = 2.5;
controls.maxDistance = 8;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.15; // very slow, contemplative

// ---------------------------------------------------------------
// STARFIELD — a quiet backdrop
// ---------------------------------------------------------------
function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 4000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    // Distribute on a far sphere
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 200 + Math.random() * 100;
    positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);

    // Subtle warm/cool tints
    const tint = Math.random();
    const brightness = 0.4 + Math.random() * 0.6;
    if (tint < 0.7) {
      colors[i * 3]     = brightness;
      colors[i * 3 + 1] = brightness;
      colors[i * 3 + 2] = brightness;
    } else if (tint < 0.85) {
      colors[i * 3]     = brightness;
      colors[i * 3 + 1] = brightness * 0.85;
      colors[i * 3 + 2] = brightness * 0.7;
    } else {
      colors[i * 3]     = brightness * 0.7;
      colors[i * 3 + 1] = brightness * 0.85;
      colors[i * 3 + 2] = brightness;
    }

    sizes[i] = Math.random() * 1.5 + 0.3;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    transparent: true,
    depthWrite: false,
    vertexColors: true,
    uniforms: {
      time: { value: 0 }
    },
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      varying float vSize;
      void main() {
        vColor = color;
        vSize = size;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vSize;
      void main() {
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        float a = smoothstep(0.5, 0.0, d);
        a = pow(a, 2.0);
        gl_FragColor = vec4(vColor, a);
      }
    `
  });

  return new THREE.Points(geo, mat);
}

scene.add(createStars());

// ---------------------------------------------------------------
// EARTH TEXTURES — loaded from /textures/ as static assets
// ---------------------------------------------------------------
// Place these files in /public/textures/ in your Vercel project:
//   earth_day_8k.jpg     — NASA Blue Marble Next Generation
//   earth_night_8k.jpg   — NASA Black Marble (city lights)
//   earth_clouds_8k.jpg  — NASA cloud composite (white on black)
//   earth_bump_8k.jpg    — NASA topography / elevation (greyscale)
//   earth_spec_8k.jpg    — Ocean specular mask (water=white, land=black)
// Sources: visibleearth.nasa.gov  (all free, public domain)
// ---------------------------------------------------------------

const textureLoader = new THREE.TextureLoader();

function loadTexture(url, { srgb = true } = {}) {
  const tex = textureLoader.load(url);
  tex.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace;
  tex.anisotropy = 8;
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

const dayTex   = loadTexture('/textures/earth_day_8k.jpg');
const nightTex = loadTexture('/textures/earth_night_8k.jpg');
const cloudTex = loadTexture('/textures/earth_clouds_8k.jpg');
const bumpTex  = loadTexture('/textures/earth_bump_8k.jpg',  { srgb: false });
const specTex  = loadTexture('/textures/earth_spec_8k.jpg',  { srgb: false });

// Legacy: keep the procedural generator as a commented fallback in case
// you want to regenerate stylized textures locally. Removed in this build.
function makeProceduralEarth_DISABLED() {
  // Use SVG-based world map silhouette for accurate continent shapes,
  // rasterized to a canvas, then color-graded.
  const W = 2048, H = 1024;

  const dayCanvas = document.createElement('canvas');
  dayCanvas.width = W; dayCanvas.height = H;
  const dctx = dayCanvas.getContext('2d');

  const nightCanvas = document.createElement('canvas');
  nightCanvas.width = W; nightCanvas.height = H;
  const nctx = nightCanvas.getContext('2d');

  // Ocean base
  const oceanGrad = dctx.createLinearGradient(0, 0, 0, H);
  oceanGrad.addColorStop(0, '#0a2540');
  oceanGrad.addColorStop(0.5, '#0e3358');
  oceanGrad.addColorStop(1, '#0a2540');
  dctx.fillStyle = oceanGrad;
  dctx.fillRect(0, 0, W, H);

  // Night ocean - very dark blue
  nctx.fillStyle = '#020610';
  nctx.fillRect(0, 0, W, H);

  // Use accurate continent outlines via inline simplified GeoJSON-like paths
  // We'll fetch a public-domain world map SVG path data string.
  // Since we want zero external deps, we use a compact embedded silhouette.

  // Strategy: draw continents using the natural earth simplified data
  // baked into a single SVG string. This keeps geography accurate.
  const worldSVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2048 1024" preserveAspectRatio="none">
    <image href="https://upload.wikimedia.org/wikipedia/commons/thumb/8/83/Equirectangular_projection_SW.jpg/2560px-Equirectangular_projection_SW.jpg" width="2048" height="1024"/>
  </svg>`;

  // Since we can't rely on external image loads working in all sandboxes,
  // use a procedural continent approximation via noise-shaped masks.
  // This produces a beautiful stylized Earth.

  // Generate value noise
  function noise2D(x, y, seed) {
    const n = Math.sin(x * 12.9898 + y * 78.233 + seed * 43.5453) * 43758.5453;
    return n - Math.floor(n);
  }

  function smoothNoise(x, y, seed) {
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x - ix, fy = y - iy;
    const a = noise2D(ix, iy, seed);
    const b = noise2D(ix + 1, iy, seed);
    const c = noise2D(ix, iy + 1, seed);
    const d = noise2D(ix + 1, iy + 1, seed);
    const ux = fx * fx * (3 - 2 * fx);
    const uy = fy * fy * (3 - 2 * fy);
    return a * (1 - ux) * (1 - uy) + b * ux * (1 - uy) + c * (1 - ux) * uy + d * ux * uy;
  }

  function fbm(x, y, seed) {
    let v = 0, a = 0.5, f = 1;
    for (let i = 0; i < 6; i++) {
      v += a * smoothNoise(x * f, y * f, seed + i);
      f *= 2; a *= 0.5;
    }
    return v;
  }

  // Approximate continent positions with weighted noise centers
  // (this is stylized but gives a recognizable Earth feel)
  const continents = [
    // [centerLon (-180..180), centerLat (-90..90), sizeX, sizeY, strength]
    // North America
    [-100, 45, 35, 25, 1.0],
    [-80, 25, 20, 15, 0.7],
    // South America
    [-60, -15, 18, 30, 1.0],
    // Europe
    [15, 50, 20, 15, 0.8],
    // Africa
    [20, 0, 22, 30, 1.0],
    // Asia
    [90, 50, 50, 25, 1.0],
    [105, 25, 25, 20, 0.8],
    // Southeast Asia / Indonesia
    [115, -2, 18, 8, 0.7],
    // Australia
    [135, -25, 18, 12, 1.0],
    // Greenland
    [-40, 72, 12, 10, 0.8],
    // Antarctica
    [0, -82, 180, 10, 1.0],
  ];

  function landValue(lon, lat) {
    let total = 0;
    for (const [cLon, cLat, sx, sy, str] of continents) {
      // Wrap longitude
      let dLon = lon - cLon;
      if (dLon > 180) dLon -= 360;
      if (dLon < -180) dLon += 360;
      const dLat = lat - cLat;
      const d = Math.sqrt((dLon / sx) ** 2 + (dLat / sy) ** 2);
      total += str * Math.exp(-d * d * 1.5);
    }
    return total;
  }

  const imgData = dctx.getImageData(0, 0, W, H);
  const nightData = nctx.getImageData(0, 0, W, H);
  const data = imgData.data;
  const nData = nightData.data;

  for (let y = 0; y < H; y++) {
    const lat = 90 - (y / H) * 180;
    for (let x = 0; x < W; x++) {
      const lon = (x / W) * 360 - 180;
      const idx = (y * W + x) * 4;

      // Base land mask from continent gaussians
      const landMask = landValue(lon, lat);
      // Add fractal noise to break up edges
      const n1 = fbm(x * 0.012, y * 0.012, 1);
      const n2 = fbm(x * 0.04, y * 0.04, 2);
      const n3 = fbm(x * 0.08, y * 0.08, 3);

      const landiness = landMask + (n1 - 0.5) * 0.6 + (n2 - 0.5) * 0.2;
      const isLand = landiness > 0.5;

      if (isLand) {
        // Biome by latitude + noise
        const absLat = Math.abs(lat);
        const moisture = n2;
        const elevation = n3;

        let r, g, b;
        if (absLat > 70) {
          // Polar / tundra - white/grey
          const w = 220 + n3 * 30;
          r = w; g = w; b = w * 0.95;
        } else if (absLat > 55) {
          // Boreal - dark green/brown
          r = 70 + elevation * 40;
          g = 85 + moisture * 50;
          b = 55 + elevation * 30;
        } else if (absLat > 30) {
          // Temperate - greens and browns
          if (moisture > 0.5) {
            r = 90 + elevation * 50;
            g = 110 + moisture * 60;
            b = 60 + elevation * 30;
          } else {
            r = 160 + elevation * 50;
            g = 140 + moisture * 40;
            b = 95 + elevation * 30;
          }
        } else if (absLat > 15) {
          // Subtropical - desert/savannah
          if (moisture > 0.55) {
            r = 100 + elevation * 50;
            g = 125 + moisture * 50;
            b = 65 + elevation * 30;
          } else {
            r = 200 + elevation * 30;
            g = 175 + moisture * 30;
            b = 115 + elevation * 25;
          }
        } else {
          // Tropical - rainforest / coastal
          r = 80 + elevation * 40;
          g = 115 + moisture * 60;
          b = 55 + elevation * 30;
        }

        // Add subtle terrain shading
        const shade = 0.85 + n3 * 0.3;
        data[idx]     = Math.min(255, r * shade);
        data[idx + 1] = Math.min(255, g * shade);
        data[idx + 2] = Math.min(255, b * shade);
        data[idx + 3] = 255;

        // Night side: city lights — clustered in temperate zones, mostly NH
        const cityChance = (absLat > 20 && absLat < 60 && lat > -40)
          ? n2 * n3 * (1 - Math.abs(lat - 40) / 60) : 0;
        const isCity = cityChance > 0.45 && Math.random() > 0.7;
        if (isCity) {
          const intensity = (cityChance - 0.45) * 4;
          nData[idx]     = Math.min(255, 255 * intensity);
          nData[idx + 1] = Math.min(255, 200 * intensity);
          nData[idx + 2] = Math.min(255, 120 * intensity);
          nData[idx + 3] = 255;
        } else {
          // Dark land at night
          nData[idx]     = 8;
          nData[idx + 1] = 10;
          nData[idx + 2] = 14;
          nData[idx + 3] = 255;
        }
      } else {
        // Ocean - depth variation
        const depth = fbm(x * 0.005, y * 0.005, 4);
        const r = 8 + depth * 20;
        const g = 30 + depth * 35;
        const b = 70 + depth * 40;
        data[idx]     = r;
        data[idx + 1] = g;
        data[idx + 2] = b;
        data[idx + 3] = 255;

        // Dark ocean at night
        nData[idx]     = 2;
        nData[idx + 1] = 4;
        nData[idx + 2] = 10;
        nData[idx + 3] = 255;
      }
    }
  }

  dctx.putImageData(imgData, 0, 0);
  nctx.putImageData(nightData, 0, 0);

  // Generate cloud texture
  const cloudCanvas = document.createElement('canvas');
  cloudCanvas.width = W; cloudCanvas.height = H;
  const cctx = cloudCanvas.getContext('2d');
  const cloudImg = cctx.createImageData(W, H);
  const cd = cloudImg.data;

  for (let y = 0; y < H; y++) {
    const lat = 90 - (y / H) * 180;
    // Cloud bands by latitude (ITCZ, mid-latitude storm tracks, polar)
    const latFactor =
      Math.exp(-(lat / 8) ** 2) * 0.6 +              // ITCZ
      Math.exp(-((lat - 50) / 15) ** 2) * 0.5 +      // N storm track
      Math.exp(-((lat + 50) / 15) ** 2) * 0.5 +      // S storm track
      Math.exp(-((lat - 80) / 12) ** 2) * 0.3 +
      Math.exp(-((lat + 80) / 12) ** 2) * 0.3;

    for (let x = 0; x < W; x++) {
      const idx = (y * W + x) * 4;
      const c1 = fbm(x * 0.008, y * 0.012, 7);
      const c2 = fbm(x * 0.025, y * 0.03, 8);
      const cloud = (c1 * 0.7 + c2 * 0.3) * (0.4 + latFactor);
      const a = Math.max(0, Math.min(255, (cloud - 0.45) * 600));
      cd[idx] = 255; cd[idx + 1] = 255; cd[idx + 2] = 255;
      cd[idx + 3] = a;
    }
  }
  cctx.putImageData(cloudImg, 0, 0);

  // Bump-ish map from land elevation
  const bumpCanvas = document.createElement('canvas');
  bumpCanvas.width = W; bumpCanvas.height = H;
  const bctx = bumpCanvas.getContext('2d');
  const bumpImg = bctx.createImageData(W, H);
  const bd = bumpImg.data;
  for (let y = 0; y < H; y++) {
    const lat = 90 - (y / H) * 180;
    for (let x = 0; x < W; x++) {
      const lon = (x / W) * 360 - 180;
      const idx = (y * W + x) * 4;
      const landMask = landValue(lon, lat);
      const n2 = fbm(x * 0.04, y * 0.04, 2);
      const n3 = fbm(x * 0.08, y * 0.08, 3);
      const landiness = landMask + (fbm(x*0.012, y*0.012, 1) - 0.5) * 0.6 + (n2 - 0.5) * 0.2;
      const isLand = landiness > 0.5;
      const v = isLand ? 100 + n3 * 155 : 30;
      bd[idx] = v; bd[idx + 1] = v; bd[idx + 2] = v; bd[idx + 3] = 255;
    }
  }
  bctx.putImageData(bumpImg, 0, 0);

  // Specular: oceans reflective, land matte
  const specCanvas = document.createElement('canvas');
  specCanvas.width = W; specCanvas.height = H;
  const sctx = specCanvas.getContext('2d');
  const specImg = sctx.createImageData(W, H);
  const sd = specImg.data;
  for (let y = 0; y < H; y++) {
    const lat = 90 - (y / H) * 180;
    for (let x = 0; x < W; x++) {
      const lon = (x / W) * 360 - 180;
      const idx = (y * W + x) * 4;
      const landMask = landValue(lon, lat);
      const landiness = landMask + (fbm(x*0.012, y*0.012, 1) - 0.5) * 0.6 + (fbm(x*0.04, y*0.04, 2) - 0.5) * 0.2;
      const isLand = landiness > 0.5;
      const v = isLand ? 20 : 220;
      sd[idx] = v; sd[idx + 1] = v; sd[idx + 2] = v; sd[idx + 3] = 255;
    }
  }
  sctx.putImageData(specImg, 0, 0);

  return {
    day: dayCanvas,
    night: nightCanvas,
    clouds: cloudCanvas,
    bump: bumpCanvas,
    specular: specCanvas
  };
}

// (Texture loading is now handled above via TextureLoader.)

// ---------------------------------------------------------------
// EARTH GLOBE — custom shader for day/night blending
// ---------------------------------------------------------------
const EARTH_RADIUS = 1.0;

const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 128);

const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    dayMap:    { value: dayTex },
    nightMap:  { value: nightTex },
    bumpMap:   { value: bumpTex },
    specMap:   { value: specTex },
    sunDir:    { value: new THREE.Vector3(1, 0, 0) },
    bumpScale: { value: 0.025 },
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vNormal = normalize(normalMatrix * normal);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform sampler2D dayMap;
    uniform sampler2D nightMap;
    uniform sampler2D bumpMap;
    uniform sampler2D specMap;
    uniform vec3 sunDir;
    uniform float bumpScale;

    varying vec2 vUv;
    varying vec3 vNormal;
    varying vec3 vWorldPos;

    void main() {
      vec3 normal = normalize(vNormal);

      // Sun direction in world space, transformed to view-relative normal frame
      // We compute lighting in world space using the geometric normal.
      // Reconstruct world normal from worldPos (sphere centered at origin, r=1)
      vec3 worldNormal = normalize(vWorldPos);

      float sunDot = dot(worldNormal, normalize(sunDir));

      // Smooth terminator
      float dayWeight = smoothstep(-0.15, 0.25, sunDot);

      vec3 dayCol = texture2D(dayMap, vUv).rgb;
      vec3 nightCol = texture2D(nightMap, vUv).rgb;

      // Slight warm sunset glow at terminator
      float terminator = 1.0 - abs(sunDot * 4.0);
      terminator = clamp(terminator, 0.0, 1.0);
      vec3 sunsetTint = vec3(1.0, 0.55, 0.25) * terminator * 0.15;

      // Subtle bump shading
      float bump = texture2D(bumpMap, vUv).r;
      float bumpL = texture2D(bumpMap, vUv + vec2(0.001, 0.0)).r;
      float bumpD = texture2D(bumpMap, vUv + vec2(0.0, 0.001)).r;
      vec3 bumpNormal = normalize(vec3((bump - bumpL) * 50.0, (bump - bumpD) * 50.0, 1.0));
      float bumpLight = max(0.0, dot(bumpNormal, vec3(0.7, 0.7, 0.5))) * bumpScale * 8.0;

      vec3 dayShaded = dayCol * (0.65 + sunDot * 0.45 + bumpLight);

      // Ocean specular highlight
      float spec = texture2D(specMap, vUv).r / 255.0 * 255.0;
      float specMask = texture2D(specMap, vUv).r;
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      vec3 halfDir = normalize(normalize(sunDir) + viewDir);
      float specHi = pow(max(0.0, dot(worldNormal, halfDir)), 60.0) * specMask * dayWeight;
      vec3 specColor = vec3(1.0, 0.95, 0.85) * specHi * 0.7;

      vec3 color = mix(nightCol * 1.4, dayShaded, dayWeight);
      color += sunsetTint;
      color += specColor;

      gl_FragColor = vec4(color, 1.0);
    }
  `
});

const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// ---------------------------------------------------------------
// CLOUD LAYER
// ---------------------------------------------------------------
const cloudGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.012, 96, 96);
const cloudMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: {
    cloudMap: { value: cloudTex },
    sunDir:   { value: new THREE.Vector3(1, 0, 0) },
    time:     { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform sampler2D cloudMap;
    uniform vec3 sunDir;
    uniform float time;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vec2 uv = vUv;
      uv.x += time * 0.003;
      float c = texture2D(cloudMap, uv).a;
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float light = smoothstep(-0.2, 0.3, sunDot);
      vec3 col = mix(vec3(0.05, 0.06, 0.08), vec3(1.0, 0.98, 0.95), light);
      gl_FragColor = vec4(col, c * (0.4 + light * 0.5));
    }
  `
});
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(clouds);

// ---------------------------------------------------------------
// ATMOSPHERE — fresnel rim glow
// ---------------------------------------------------------------
const atmGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.06, 96, 96);
const atmMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    sunDir: { value: new THREE.Vector3(1, 0, 0) }
  },
  vertexShader: `
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vNormal = normalize(normalMatrix * normal);
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 sunDir;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    void main() {
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fres = pow(1.0 - abs(dot(viewDir, normalize(vWorldPos))), 2.5);
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float light = smoothstep(-0.3, 0.5, sunDot);

      // Blue on day side, deeper indigo on night side
      vec3 dayBlue = vec3(0.35, 0.6, 1.0);
      vec3 nightBlue = vec3(0.05, 0.08, 0.2);
      vec3 col = mix(nightBlue, dayBlue, light);

      // Sunset orange ring near terminator
      float term = 1.0 - abs(sunDot * 3.0);
      term = clamp(term, 0.0, 1.0);
      col += vec3(1.0, 0.5, 0.2) * term * 0.4;

      gl_FragColor = vec4(col, fres * (0.5 + light * 0.5));
    }
  `
});
const atmosphere = new THREE.Mesh(atmGeo, atmMat);
scene.add(atmosphere);

// Outer haze
const hazeGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.15, 64, 64);
const hazeMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: {
    sunDir: { value: new THREE.Vector3(1, 0, 0) }
  },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 sunDir;
    varying vec3 vWorldPos;
    void main() {
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fres = pow(1.0 - abs(dot(viewDir, normalize(vWorldPos))), 4.0);
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float light = smoothstep(-0.4, 0.5, sunDot);
      vec3 col = mix(vec3(0.02, 0.04, 0.1), vec3(0.4, 0.6, 1.0), light);
      gl_FragColor = vec4(col, fres * 0.4 * (0.3 + light * 0.7));
    }
  `
});
const haze = new THREE.Mesh(hazeGeo, hazeMat);
scene.add(haze);

// ---------------------------------------------------------------
// SUN POSITION CALCULATION
// Astronomical algorithm — accurate to within fraction of a degree
// ---------------------------------------------------------------
function getSunPosition(date) {
  // Days since J2000.0
  const JD = date.getTime() / 86400000 + 2440587.5;
  const n = JD - 2451545.0;

  // Mean longitude of the Sun (degrees)
  const L = (280.460 + 0.9856474 * n) % 360;
  // Mean anomaly
  const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
  // Ecliptic longitude
  const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
  // Obliquity of ecliptic
  const eps = (23.439 - 0.0000004 * n) * Math.PI / 180;

  // Right ascension and declination
  const ra = Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda));
  const dec = Math.asin(Math.sin(eps) * Math.sin(lambda));

  // Greenwich Mean Sidereal Time
  const utHours = (date.getUTCHours()
    + date.getUTCMinutes() / 60
    + date.getUTCSeconds() / 3600);
  let GMST = (18.697374558 + 24.06570982441908 * n) % 24;
  if (GMST < 0) GMST += 24;
  const GMST_rad = GMST * 15 * Math.PI / 180;

  // Sub-solar longitude (where sun is overhead)
  let subSolarLon = (ra - GMST_rad) * 180 / Math.PI;
  while (subSolarLon > 180) subSolarLon -= 360;
  while (subSolarLon < -180) subSolarLon += 360;
  const subSolarLat = dec * 180 / Math.PI;

  // Convert to 3D unit vector (Y is north pole)
  const latRad = subSolarLat * Math.PI / 180;
  const lonRad = subSolarLon * Math.PI / 180;
  const x = Math.cos(latRad) * Math.cos(lonRad);
  const z = -Math.cos(latRad) * Math.sin(lonRad);
  const y = Math.sin(latRad);

  return {
    vector: new THREE.Vector3(x, y, z).normalize(),
    longitude: subSolarLon,
    latitude: subSolarLat
  };
}

// ---------------------------------------------------------------
// UI WIRING
// ---------------------------------------------------------------
const speedButtons = document.querySelectorAll('.speed-btn');
speedButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    speedButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timeController.setSpeed(parseFloat(btn.dataset.speed));
  });
});

const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date');
const sunLonEl = document.getElementById('sunLon');
const sunLatEl = document.getElementById('sunLat');

function formatTime(d) {
  const h = String(d.getUTCHours()).padStart(2, '0');
  const m = String(d.getUTCMinutes()).padStart(2, '0');
  const s = String(d.getUTCSeconds()).padStart(2, '0');
  return `${h}:${m}:${s} UTC`;
}

function formatDate(d) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return `${String(d.getUTCDate()).padStart(2,'0')} ${months[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
}

// Hide loading once first frame renders
let loaded = false;

// ---------------------------------------------------------------
// RENDER LOOP
// ---------------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);

  const now = timeController.date();
  const sun = getSunPosition(now);

  // Update Earth & atmosphere uniforms with sun direction
  earthMat.uniforms.sunDir.value.copy(sun.vector);
  cloudMat.uniforms.sunDir.value.copy(sun.vector);
  cloudMat.uniforms.time.value = timeController.now() / 1000;
  atmMat.uniforms.sunDir.value.copy(sun.vector);
  hazeMat.uniforms.sunDir.value.copy(sun.vector);

  // UI
  clockEl.textContent = formatTime(now);
  dateEl.textContent = formatDate(now);
  sunLonEl.textContent = `${sun.longitude.toFixed(2)}°`;
  sunLatEl.textContent = `${sun.latitude.toFixed(2)}°`;

  controls.update();
  renderer.render(scene, camera);

  if (!loaded) {
    loaded = true;
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
    }, 200);
  }
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
