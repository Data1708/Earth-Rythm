<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>A Living Earth · Phase II</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05070d;
    --ink: #e8e6df;
    --ink-dim: #8a8478;
    --ink-faint: #4a4639;
    --accent: #d4a574;
    --line: rgba(232, 230, 223, 0.12);
    --display: 'Cormorant Garamond', serif;
    --mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--mono);
    font-weight: 300;
    cursor: default;
  }

  #scene { position: fixed; inset: 0; z-index: 0; }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  }

  .header {
    position: fixed;
    top: 0; left: 0; right: 0;
    padding: 28px 36px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    z-index: 10;
    pointer-events: none;
  }

  .title {
    font-family: var(--display);
    font-size: 28px;
    font-weight: 300;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .title em { font-style: italic; color: var(--accent); }

  .subtitle {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-top: 8px;
  }

  .header-right {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-dim);
    line-height: 1.8;
  }
  .header-right .clock {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--ink);
    letter-spacing: 0.1em;
  }

  .controls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 28px 36px 32px;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    pointer-events: none;
  }
  .controls > * { pointer-events: auto; }

  .speed-controls { display: flex; flex-direction: column; gap: 14px; }

  .speed-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }

  .speed-buttons {
    display: flex;
    border: 1px solid var(--line);
    background: rgba(5, 7, 13, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }

  .speed-btn {
    background: transparent;
    border: none;
    border-right: 1px solid var(--line);
    color: var(--ink-dim);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 300;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s ease;
    min-width: 72px;
  }
  .speed-btn:last-child { border-right: none; }
  .speed-btn:hover { color: var(--ink); background: rgba(212, 165, 116, 0.05); }
  .speed-btn.active { color: var(--bg); background: var(--accent); }
  .speed-btn.active:hover { background: var(--accent); }

  .info-panel {
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    line-height: 2.2;
    text-transform: uppercase;
  }
  .info-panel .value {
    color: var(--ink);
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  .crosshair {
    position: fixed;
    width: 16px;
    height: 16px;
    z-index: 5;
    pointer-events: none;
  }
  .crosshair::before, .crosshair::after {
    content: '';
    position: absolute;
    background: var(--ink-faint);
  }
  .crosshair::before { width: 100%; height: 1px; top: 50%; }
  .crosshair::after { width: 1px; height: 100%; left: 50%; }
  .crosshair.tl { top: 80px; left: 36px; }
  .crosshair.tr { top: 80px; right: 36px; }
  .crosshair.bl { bottom: 100px; left: 36px; }
  .crosshair.br { bottom: 100px; right: 36px; }

  .loading {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 50;
    transition: opacity 0.8s ease;
    font-size: 10px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .loading.hidden { opacity: 0; pointer-events: none; }

  .center-line {
    position: fixed;
    top: 80px;
    bottom: 100px;
    left: 50%;
    width: 1px;
    background: linear-gradient(to bottom, transparent, var(--ink-faint) 20%, var(--ink-faint) 80%, transparent);
    opacity: 0.3;
    z-index: 1;
    pointer-events: none;
  }

  /* Layers panel — left side, below header */
  .layers-panel {
    position: fixed;
    top: 140px;
    left: 36px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .layers-label {
    font-size: 9px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }

  .layer-toggle {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(5, 7, 13, 0.5);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    padding: 8px 14px;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--ink-dim);
    transition: all 0.4s ease;
    min-width: 180px;
  }

  .layer-toggle:hover {
    color: var(--ink);
    border-color: rgba(212, 165, 116, 0.3);
  }

  .layer-toggle.active {
    color: var(--ink);
    border-color: var(--accent);
  }

  .layer-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--ink-faint);
    transition: all 0.4s ease;
  }

  .layer-toggle.active .layer-dot {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }

  .layer-name { flex: 1; }

  .layer-count {
    font-size: 9px;
    color: var(--ink-faint);
    letter-spacing: 0.1em;
  }

  .layer-toggle.active .layer-count {
    color: var(--accent);
  }

  /* Quake info panel — right side, additional info */
  .quake-info {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
    text-align: right;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--ink-dim);
    line-height: 2;
    text-transform: uppercase;
  }

  .quake-info .value { color: var(--ink); }
  .quake-info .strong-value {
    color: var(--accent);
    font-size: 14px;
    font-family: var(--display);
    font-style: italic;
    letter-spacing: 0;
    text-transform: none;
  }

  /* Tooltip for hovered quake */
  .quake-tooltip {
    position: fixed;
    pointer-events: none;
    z-index: 20;
    background: rgba(5, 7, 13, 0.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--line);
    border-left: 2px solid var(--accent);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.05em;
    color: var(--ink);
    line-height: 1.6;
    max-width: 260px;
    opacity: 0;
    transition: opacity 0.2s ease;
    transform: translate(12px, -50%);
  }

  .quake-tooltip.visible { opacity: 1; }
  .quake-tooltip .mag {
    font-family: var(--display);
    font-size: 22px;
    font-style: italic;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .quake-tooltip .place { color: var(--ink); margin-bottom: 4px; }
  .quake-tooltip .meta { color: var(--ink-dim); font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="loading" id="loading">Composing the Earth…</div>

<div class="crosshair tl"></div>
<div class="crosshair tr"></div>
<div class="crosshair bl"></div>
<div class="crosshair br"></div>
<div class="center-line"></div>

<div class="header">
  <div>
    <div class="title">A Living <em>Earth</em></div>
    <div class="subtitle">Phase II &middot; The Trembling Earth</div>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">&mdash;&mdash; UTC</div>
    <div id="date">&mdash;&mdash;</div>
  </div>
</div>

<div class="layers-panel">
  <div class="layers-label">Layers</div>
  <div class="layer-toggle active" id="layer-quakes" data-layer="quakes">
    <span class="layer-dot"></span>
    <span class="layer-name">Earthquakes</span>
    <span class="layer-count" id="quakes-count">&mdash;</span>
  </div>
</div>

<div class="quake-tooltip" id="quake-tooltip">
  <div class="mag" id="tip-mag">&mdash;</div>
  <div class="place" id="tip-place">&mdash;</div>
  <div class="meta" id="tip-meta">&mdash;</div>
</div>

<div class="controls">
  <div class="speed-controls">
    <div class="speed-label">Tempo</div>
    <div class="speed-buttons" id="speedButtons">
      <button class="speed-btn active" data-speed="1">Real</button>
      <button class="speed-btn" data-speed="3600">Hour/s</button>
      <button class="speed-btn" data-speed="86400">Day/s</button>
      <button class="speed-btn" data-speed="604800">Week/s</button>
      <button class="speed-btn" data-speed="31536000">Year/s</button>
    </div>
  </div>
  <div class="info-panel">
    <div>Sun Longitude &middot; <span class="value" id="sunLon">&mdash;&mdash;</span></div>
    <div>Sun Latitude &middot; <span class="value" id="sunLat">&mdash;&mdash;</span></div>
    <div>Tilt &middot; <span class="value">23.44&deg;</span></div>
    <div class="quake-info">
      <div>Largest Past 24h &middot; <span class="strong-value" id="quake-max">&mdash;</span></div>
      <div>Last Update &middot; <span class="value" id="quake-updated">&mdash;</span></div>
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// Small helper used throughout
function pad(n) { return String(n).padStart(2, '0'); }

// Time controller
class TimeController {
  constructor() {
    this.realStart = Date.now();
    this.simStart = Date.now();
    this.speed = 1;
  }
  setSpeed(multiplier) {
    this.simStart = this.now();
    this.realStart = Date.now();
    this.speed = multiplier;
  }
  now() {
    return this.simStart + (Date.now() - this.realStart) * this.speed;
  }
  date() { return new Date(this.now()); }
}
const timeController = new TimeController();

// Renderer
const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({
  canvas, antialias: true, alpha: true, powerPreference: 'high-performance'
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.25;

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.4, 4.2);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.rotateSpeed = 0.4;
controls.enablePan = false;
controls.minDistance = 2.5;
controls.maxDistance = 8;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.15;

// Stars
function createStars() {
  const geo = new THREE.BufferGeometry();
  const count = 4000;
  const positions = new Float32Array(count * 3);
  const colors = new Float32Array(count * 3);
  const sizes = new Float32Array(count);

  for (let i = 0; i < count; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 200 + Math.random() * 100;
    positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i*3+2] = r * Math.cos(phi);

    const tint = Math.random();
    const b = 0.4 + Math.random() * 0.6;
    if (tint < 0.7) {
      colors[i*3] = b; colors[i*3+1] = b; colors[i*3+2] = b;
    } else if (tint < 0.85) {
      colors[i*3] = b; colors[i*3+1] = b * 0.85; colors[i*3+2] = b * 0.7;
    } else {
      colors[i*3] = b * 0.7; colors[i*3+1] = b * 0.85; colors[i*3+2] = b;
    }
    sizes[i] = Math.random() * 1.5 + 0.3;
  }

  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

  const mat = new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, vertexColors: true,
    vertexShader: `
      attribute float size;
      varying vec3 vColor;
      void main() {
        vColor = color;
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_PointSize = size * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      void main() {
        vec2 c = gl_PointCoord - vec2(0.5);
        float d = length(c);
        float a = smoothstep(0.5, 0.0, d);
        a = pow(a, 2.0);
        gl_FragColor = vec4(vColor, a);
      }
    `
  });
  return new THREE.Points(geo, mat);
}
scene.add(createStars());

// Earth textures (place files in /textures/ at repo root)
const textureLoader = new THREE.TextureLoader();
function loadTexture(url, options) {
  const opts = options || {};
  const srgb = opts.srgb !== false;
  const tex = textureLoader.load(
    url,
    undefined,
    undefined,
    function (err) { console.warn('Texture failed:', url, err); }
  );
  tex.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace;
  tex.anisotropy = 8;
  tex.wrapS = THREE.RepeatWrapping;
  return tex;
}

const dayTex   = loadTexture('/textures/earth_day_8k.jpg');
const nightTex = loadTexture('/textures/earth_night_8k.jpg');
const cloudTex = loadTexture('/textures/earth_clouds_8k.jpg');
const bumpTex  = loadTexture('/textures/earth_bump_8k.jpg',  { srgb: false });
const specTex  = loadTexture('/textures/earth_spec_8k.jpg',  { srgb: false });

// Earth globe
const EARTH_RADIUS = 1.0;
const earthGeo = new THREE.SphereGeometry(EARTH_RADIUS, 128, 128);

const earthMat = new THREE.ShaderMaterial({
  uniforms: {
    dayMap:    { value: dayTex },
    nightMap:  { value: nightTex },
    bumpMap:   { value: bumpTex },
    specMap:   { value: specTex },
    sunDir:    { value: new THREE.Vector3(1, 0, 0) },
    bumpScale: { value: 0.025 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform sampler2D dayMap;
    uniform sampler2D nightMap;
    uniform sampler2D bumpMap;
    uniform sampler2D specMap;
    uniform vec3 sunDir;
    uniform float bumpScale;

    varying vec2 vUv;
    varying vec3 vWorldPos;

    void main() {
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float dayWeight = smoothstep(-0.15, 0.25, sunDot);

      vec3 dayCol = texture2D(dayMap, vUv).rgb;
      vec3 nightCol = texture2D(nightMap, vUv).rgb;

      float terminator = clamp(1.0 - abs(sunDot * 4.0), 0.0, 1.0);
      vec3 sunsetTint = vec3(1.0, 0.55, 0.25) * terminator * 0.15;

      float bump  = texture2D(bumpMap, vUv).r;
      float bumpL = texture2D(bumpMap, vUv + vec2(0.001, 0.0)).r;
      float bumpD = texture2D(bumpMap, vUv + vec2(0.0, 0.001)).r;
      vec3 bumpNormal = normalize(vec3((bump - bumpL) * 50.0, (bump - bumpD) * 50.0, 1.0));
      float bumpLight = max(0.0, dot(bumpNormal, vec3(0.7, 0.7, 0.5))) * bumpScale * 8.0;

      vec3 dayShaded = dayCol * (0.85 + sunDot * 0.6 + bumpLight);

      // Sub-solar hot spot + warm bloom — a soft golden glow that
      // follows the sun's overhead point across the globe.
      // sunDot is 1.0 directly under the sun, falls off toward the limb.
      float overhead = max(0.0, sunDot);
      // Tight bright core — visible "hot spot" right under the sun
      float hotSpot = pow(overhead, 4.0) * 0.35;
      // Wider warm halo — the poetic bloom
      float warmHalo = pow(overhead, 1.5) * 0.25;
      vec3 sunWarmth = vec3(1.0, 0.85, 0.6) * (hotSpot + warmHalo);
      dayShaded += dayCol * sunWarmth;

      float specMask = texture2D(specMap, vUv).r;
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      vec3 halfDir = normalize(normalize(sunDir) + viewDir);
      float specHi = pow(max(0.0, dot(worldNormal, halfDir)), 60.0) * specMask * dayWeight;
      vec3 specColor = vec3(1.0, 0.95, 0.85) * specHi * 0.7;

      vec3 color = mix(nightCol * 1.8, dayShaded, dayWeight);
      color += sunsetTint;
      color += specColor;

      gl_FragColor = vec4(color, 1.0);
    }
  `
});
const earth = new THREE.Mesh(earthGeo, earthMat);
scene.add(earth);

// Cloud layer
const cloudGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.012, 96, 96);
const cloudMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  uniforms: {
    cloudMap: { value: cloudTex },
    sunDir:   { value: new THREE.Vector3(1, 0, 0) },
    time:     { value: 0 }
  },
  vertexShader: `
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vUv = uv;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform sampler2D cloudMap;
    uniform vec3 sunDir;
    uniform float time;
    varying vec2 vUv;
    varying vec3 vWorldPos;
    void main() {
      vec2 uv = vUv;
      uv.x += time * 0.003;
      vec3 sample = texture2D(cloudMap, uv).rgb;
      float c = max(sample.r, max(sample.g, sample.b));
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float light = smoothstep(-0.2, 0.3, sunDot);
      vec3 col = mix(vec3(0.05, 0.06, 0.08), vec3(1.0, 0.98, 0.95), light);
      gl_FragColor = vec4(col, c * (0.4 + light * 0.5));
    }
  `
});
const clouds = new THREE.Mesh(cloudGeo, cloudMat);
scene.add(clouds);

// Atmosphere
const atmGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.06, 96, 96);
const atmMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: { sunDir: { value: new THREE.Vector3(1, 0, 0) } },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 sunDir;
    varying vec3 vWorldPos;
    void main() {
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fres = pow(1.0 - abs(dot(viewDir, normalize(vWorldPos))), 2.5);
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float light = smoothstep(-0.3, 0.5, sunDot);
      vec3 col = mix(vec3(0.05, 0.08, 0.2), vec3(0.35, 0.6, 1.0), light);
      float term = clamp(1.0 - abs(sunDot * 3.0), 0.0, 1.0);
      col += vec3(1.0, 0.5, 0.2) * term * 0.4;
      gl_FragColor = vec4(col, fres * (0.5 + light * 0.5));
    }
  `
});
const atmosphere = new THREE.Mesh(atmGeo, atmMat);
scene.add(atmosphere);

// Outer haze
const hazeGeo = new THREE.SphereGeometry(EARTH_RADIUS * 1.15, 64, 64);
const hazeMat = new THREE.ShaderMaterial({
  transparent: true,
  side: THREE.BackSide,
  depthWrite: false,
  uniforms: { sunDir: { value: new THREE.Vector3(1, 0, 0) } },
  vertexShader: `
    varying vec3 vWorldPos;
    void main() {
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }
  `,
  fragmentShader: `
    uniform vec3 sunDir;
    varying vec3 vWorldPos;
    void main() {
      vec3 viewDir = normalize(cameraPosition - vWorldPos);
      float fres = pow(1.0 - abs(dot(viewDir, normalize(vWorldPos))), 4.0);
      vec3 worldNormal = normalize(vWorldPos);
      float sunDot = dot(worldNormal, normalize(sunDir));
      float light = smoothstep(-0.4, 0.5, sunDot);
      vec3 col = mix(vec3(0.02, 0.04, 0.1), vec3(0.4, 0.6, 1.0), light);
      gl_FragColor = vec4(col, fres * 0.4 * (0.3 + light * 0.7));
    }
  `
});
const haze = new THREE.Mesh(hazeGeo, hazeMat);
scene.add(haze);

// Sun position (astronomical, accurate)
function getSunPosition(date) {
  const JD = date.getTime() / 86400000 + 2440587.5;
  const n = JD - 2451545.0;
  const L = (280.460 + 0.9856474 * n) % 360;
  const g = ((357.528 + 0.9856003 * n) % 360) * Math.PI / 180;
  const lambda = (L + 1.915 * Math.sin(g) + 0.020 * Math.sin(2 * g)) * Math.PI / 180;
  const eps = (23.439 - 0.0000004 * n) * Math.PI / 180;
  const ra = Math.atan2(Math.cos(eps) * Math.sin(lambda), Math.cos(lambda));
  const dec = Math.asin(Math.sin(eps) * Math.sin(lambda));
  let GMST = (18.697374558 + 24.06570982441908 * n) % 24;
  if (GMST < 0) GMST += 24;
  const GMST_rad = GMST * 15 * Math.PI / 180;
  let subSolarLon = (ra - GMST_rad) * 180 / Math.PI;
  while (subSolarLon > 180) subSolarLon -= 360;
  while (subSolarLon < -180) subSolarLon += 360;
  const subSolarLat = dec * 180 / Math.PI;
  const latRad = subSolarLat * Math.PI / 180;
  const lonRad = subSolarLon * Math.PI / 180;
  const x = Math.cos(latRad) * Math.cos(lonRad);
  const z = -Math.cos(latRad) * Math.sin(lonRad);
  const y = Math.sin(latRad);
  return {
    vector: new THREE.Vector3(x, y, z).normalize(),
    longitude: subSolarLon,
    latitude: subSolarLat
  };
}

// ---------------------------------------------------------------
// EARTHQUAKE LAYER
// ---------------------------------------------------------------
// Pulls live data from USGS feed (no API key, CORS-enabled).
// Each quake renders as:
//   1. A persistent dot on the globe (always visible while layer is on)
//   2. A ripple ring that expands at the quake's actual time when scrubbing
// ---------------------------------------------------------------

const USGS_FEED = 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_day.geojson';

// Convert lat/lon (degrees) to a 3D position on a sphere of given radius.
function latLonToVec3(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  const x = -radius * Math.sin(phi) * Math.cos(theta);
  const z =  radius * Math.sin(phi) * Math.sin(theta);
  const y =  radius * Math.cos(phi);
  return new THREE.Vector3(x, y, z);
}

class EarthquakeLayer {
  constructor(scene, earthRadius) {
    this.scene = scene;
    this.earthRadius = earthRadius;
    this.quakes = [];        // Array of { id, mag, lat, lon, depth, time, place, position }
    this.enabled = true;
    this.lastFetch = 0;
    this.fetchInterval = 60000; // 60 seconds

    // Group holds all visual elements
    this.group = new THREE.Group();
    scene.add(this.group);

    // Pool of ripple ring meshes (reused as quakes "fire")
    this.ripples = [];
    this.maxRipples = 32;

    // Persistent dot mesh — uses InstancedMesh for performance with many quakes
    this.dotGeo = new THREE.SphereGeometry(0.005, 8, 8);
    this.dotMat = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      uniforms: {
        sunDir: { value: new THREE.Vector3(1, 0, 0) }
      },
      vertexShader: `
        attribute vec3 instColor;
        attribute float instScale;
        varying vec3 vColor;
        varying vec3 vWorldPos;
        void main() {
          vColor = instColor;
          mat4 m = instanceMatrix;
          // Apply per-instance scale on top of instance matrix
          m[0].xyz *= instScale;
          m[1].xyz *= instScale;
          m[2].xyz *= instScale;
          vec4 wp = modelMatrix * m * vec4(position, 1.0);
          vWorldPos = wp.xyz;
          gl_Position = projectionMatrix * viewMatrix * wp;
        }
      `,
      fragmentShader: `
        uniform vec3 sunDir;
        varying vec3 vColor;
        varying vec3 vWorldPos;
        void main() {
          // Slightly dim quakes on the night side for visual coherence
          vec3 worldNormal = normalize(vWorldPos);
          float sunDot = dot(worldNormal, normalize(sunDir));
          float light = smoothstep(-0.4, 0.3, sunDot);
          float bright = 0.85 + light * 0.15;
          gl_FragColor = vec4(vColor * bright, 1.0);
        }
      `
    });
    this.dotMesh = null; // Will be created when data arrives

    // Pre-create ripple ring meshes
    const ringGeo = new THREE.RingGeometry(0.01, 0.012, 48);
    for (let i = 0; i < this.maxRipples; i++) {
      const mat = new THREE.ShaderMaterial({
        transparent: true,
        depthWrite: false,
        side: THREE.DoubleSide,
        uniforms: {
          progress: { value: 0 },
          color:    { value: new THREE.Color(0xd4a574) }
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform float progress;
          uniform vec3 color;
          varying vec2 vUv;
          void main() {
            // Fade out as ring expands
            float alpha = (1.0 - progress) * 0.9;
            gl_FragColor = vec4(color, alpha);
          }
        `
      });
      const mesh = new THREE.Mesh(ringGeo, mat);
      mesh.visible = false;
      this.ripples.push({ mesh, mat, active: false, startTime: 0, mag: 0, position: null });
      this.group.add(mesh);
    }

    // Raycasting for hover tooltip
    this.raycaster = new THREE.Raycaster();
    this.raycaster.params.Points = { threshold: 0.02 };
    this.mouse = new THREE.Vector2();
    this.hoveredQuake = null;
  }

  setEnabled(enabled) {
    this.enabled = enabled;
    this.group.visible = enabled;
  }

  // Color for magnitude — warm amber ramps to fiery red for large quakes
  magColor(mag) {
    // Mild quakes: dim amber
    // Moderate: warm orange
    // Large: red
    if (mag < 2.5) return new THREE.Color(0.6, 0.5, 0.3);
    if (mag < 4.5) return new THREE.Color(0.9, 0.65, 0.35);
    if (mag < 6.0) return new THREE.Color(1.0, 0.5, 0.25);
    return new THREE.Color(1.0, 0.3, 0.2);
  }

  // Visual scale for magnitude
  magScale(mag) {
    // Smallest: 0.5x, Largest (M8+): ~5x
    return Math.max(0.5, Math.pow(Math.max(0.1, mag), 1.4) * 0.5);
  }

  // Ripple ring radius scale by magnitude (final size)
  rippleMaxRadius(mag) {
    return 0.03 + Math.pow(Math.max(0.1, mag), 1.6) * 0.015;
  }

  async fetchData() {
    try {
      const res = await fetch(USGS_FEED);
      if (!res.ok) throw new Error('USGS fetch failed: ' + res.status);
      const data = await res.json();

      this.quakes = data.features.map(f => {
        const [lon, lat, depth] = f.geometry.coordinates;
        const mag = f.properties.mag != null ? f.properties.mag : 0;
        return {
          id: f.id,
          mag,
          lat,
          lon,
          depth,
          time: f.properties.time, // ms epoch
          place: f.properties.place || 'Unknown location',
          position: latLonToVec3(lat, lon, this.earthRadius * 1.005)
        };
      });

      // Sort newest first
      this.quakes.sort((a, b) => b.time - a.time);

      this.rebuildDots();
      this.updateUI();

      this.lastFetch = Date.now();
      console.log('USGS: loaded ' + this.quakes.length + ' quakes from past 24h');
    } catch (err) {
      console.warn('Earthquake data fetch failed:', err);
      const updatedEl = document.getElementById('quake-updated');
      if (updatedEl) updatedEl.textContent = 'OFFLINE';
    }
  }

  rebuildDots() {
    // Remove existing instanced mesh
    if (this.dotMesh) {
      this.group.remove(this.dotMesh);
      this.dotMesh.geometry.dispose();
      this.dotMesh = null;
    }

    if (this.quakes.length === 0) return;

    const count = this.quakes.length;
    const mesh = new THREE.InstancedMesh(this.dotGeo, this.dotMat, count);

    // Per-instance attributes
    const colors = new Float32Array(count * 3);
    const scales = new Float32Array(count);

    const dummy = new THREE.Object3D();
    for (let i = 0; i < count; i++) {
      const q = this.quakes[i];
      dummy.position.copy(q.position);
      dummy.lookAt(0, 0, 0);
      dummy.updateMatrix();
      mesh.setMatrixAt(i, dummy.matrix);

      const c = this.magColor(q.mag);
      colors[i * 3]     = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;
      scales[i] = this.magScale(q.mag);
    }

    mesh.geometry.setAttribute('instColor',
      new THREE.InstancedBufferAttribute(colors, 3));
    mesh.geometry.setAttribute('instScale',
      new THREE.InstancedBufferAttribute(scales, 1));

    mesh.instanceMatrix.needsUpdate = true;
    this.dotMesh = mesh;
    this.group.add(mesh);
  }

  updateUI() {
    const countEl = document.getElementById('quakes-count');
    const maxEl = document.getElementById('quake-max');
    const updatedEl = document.getElementById('quake-updated');

    if (countEl) countEl.textContent = this.quakes.length;

    if (this.quakes.length > 0) {
      const maxMag = Math.max(...this.quakes.map(q => q.mag || 0));
      if (maxEl) maxEl.textContent = 'M' + maxMag.toFixed(1);
    } else if (maxEl) {
      maxEl.textContent = '—';
    }

    if (updatedEl) {
      const now = new Date();
      updatedEl.textContent = pad(now.getUTCHours()) + ':' + pad(now.getUTCMinutes()) + ' UTC';
    }
  }

  // Trigger a ripple ring at a quake's location
  fireRipple(quake) {
    // Find an inactive ripple to use
    const slot = this.ripples.find(r => !r.active);
    if (!slot) return; // All in use, skip

    slot.active = true;
    slot.startTime = performance.now();
    slot.mag = quake.mag;
    slot.position = quake.position;

    // Position and orient
    const ring = slot.mesh;
    ring.position.copy(quake.position);
    ring.lookAt(0, 0, 0);
    ring.visible = true;

    // Color matches magnitude
    slot.mat.uniforms.color.value.copy(this.magColor(quake.mag));
  }

  // Called every frame
  update(simTimeMs, simSpeed) {
    if (!this.enabled) return;

    // Fetch refresh — only at real time and only every fetchInterval
    if (Date.now() - this.lastFetch > this.fetchInterval) {
      this.fetchData();
    }

    // Update sun direction uniform on the dot shader
    this.dotMat.uniforms.sunDir.value.copy(earthMat.uniforms.sunDir.value);

    // Animate active ripples
    const wallNow = performance.now();
    for (const r of this.ripples) {
      if (!r.active) continue;
      const elapsed = (wallNow - r.startTime) / 1000; // seconds
      const duration = 2.5; // ripple lasts 2.5s wall time regardless of sim speed
      const t = elapsed / duration;
      if (t >= 1.0) {
        r.active = false;
        r.mesh.visible = false;
        continue;
      }
      r.mat.uniforms.progress.value = t;
      // Scale ring outward from initial size to final radius
      const targetRadius = this.rippleMaxRadius(r.mag);
      const scale = 1 + t * (targetRadius / 0.011 - 1);
      r.mesh.scale.set(scale, scale, scale);
    }

    // Time-based ripple firing — fire ripples for quakes whose actual time
    // falls in the last frame's worth of sim time.
    if (simSpeed >= 1 && simSpeed <= 86400 * 7) {
      // Only fire ripples if we're actually moving forward through time
      // (not at extreme speeds where everything would fire at once)
      if (this._lastSimTime != null && simTimeMs > this._lastSimTime) {
        for (const q of this.quakes) {
          if (q.time > this._lastSimTime && q.time <= simTimeMs) {
            // Only fire if reasonably "loud" — small quakes would spam
            // At fast speeds, raise the threshold so it doesn't overwhelm
            const threshold = simSpeed > 3600 ? 4.0 : 2.5;
            if (q.mag >= threshold) this.fireRipple(q);
          }
        }
      }
    }
    this._lastSimTime = simTimeMs;
  }

  // Hover detection
  pickAtScreen(ndcX, ndcY, camera) {
    if (!this.enabled || !this.dotMesh) return null;
    this.mouse.set(ndcX, ndcY);
    this.raycaster.setFromCamera(this.mouse, camera);
    const hits = this.raycaster.intersectObject(this.dotMesh);
    if (hits.length === 0) return null;
    const idx = hits[0].instanceId;
    return idx != null ? this.quakes[idx] : null;
  }
}

const earthquakeLayer = new EarthquakeLayer(scene, EARTH_RADIUS);
earthquakeLayer.fetchData(); // Initial fetch

// ---------------------------------------------------------------

const speedButtons = document.querySelectorAll('.speed-btn');
speedButtons.forEach(function (btn) {
  btn.addEventListener('click', function () {
    speedButtons.forEach(function (b) { b.classList.remove('active'); });
    btn.classList.add('active');
    timeController.setSpeed(parseFloat(btn.dataset.speed));
  });
});

// Layer toggles
document.querySelectorAll('.layer-toggle').forEach(function (toggle) {
  toggle.addEventListener('click', function () {
    const layer = toggle.dataset.layer;
    const isActive = toggle.classList.toggle('active');
    if (layer === 'quakes') earthquakeLayer.setEnabled(isActive);
  });
});

// Mouse hover -> quake tooltip
const tooltipEl = document.getElementById('quake-tooltip');
const tipMag = document.getElementById('tip-mag');
const tipPlace = document.getElementById('tip-place');
const tipMeta = document.getElementById('tip-meta');

let mouseX = 0, mouseY = 0;

window.addEventListener('mousemove', function (e) {
  mouseX = e.clientX;
  mouseY = e.clientY;
  const ndcX = (e.clientX / window.innerWidth) * 2 - 1;
  const ndcY = -(e.clientY / window.innerHeight) * 2 + 1;
  const quake = earthquakeLayer.pickAtScreen(ndcX, ndcY, camera);
  if (quake) {
    tipMag.textContent = 'M ' + quake.mag.toFixed(1);
    tipPlace.textContent = quake.place;
    const d = new Date(quake.time);
    tipMeta.textContent =
      pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ' UTC · ' +
      'Depth ' + quake.depth.toFixed(0) + ' km';
    tooltipEl.style.left = e.clientX + 'px';
    tooltipEl.style.top = e.clientY + 'px';
    tooltipEl.classList.add('visible');
    document.body.style.cursor = 'pointer';
  } else {
    tooltipEl.classList.remove('visible');
    document.body.style.cursor = '';
  }
});

const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date');
const sunLonEl = document.getElementById('sunLon');
const sunLatEl = document.getElementById('sunLat');

function formatTime(d) {
  return pad(d.getUTCHours()) + ':' + pad(d.getUTCMinutes()) + ':' + pad(d.getUTCSeconds()) + ' UTC';
}
function formatDate(d) {
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  return pad(d.getUTCDate()) + ' ' + months[d.getUTCMonth()] + ' ' + d.getUTCFullYear();
}

let loaded = false;

function animate() {
  requestAnimationFrame(animate);

  const now = timeController.date();
  const sun = getSunPosition(now);

  earthMat.uniforms.sunDir.value.copy(sun.vector);
  cloudMat.uniforms.sunDir.value.copy(sun.vector);
  cloudMat.uniforms.time.value = timeController.now() / 1000;
  atmMat.uniforms.sunDir.value.copy(sun.vector);
  hazeMat.uniforms.sunDir.value.copy(sun.vector);

  // Earthquake layer — needs sim time and current speed
  earthquakeLayer.update(timeController.now(), timeController.speed);

  clockEl.textContent = formatTime(now);
  dateEl.textContent = formatDate(now);
  sunLonEl.textContent = sun.longitude.toFixed(2) + '\u00B0';
  sunLatEl.textContent = sun.latitude.toFixed(2) + '\u00B0';

  controls.update();
  renderer.render(scene, camera);

  if (!loaded) {
    loaded = true;
    setTimeout(function () {
      document.getElementById('loading').classList.add('hidden');
    }, 200);
  }
}

window.addEventListener('resize', function () {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
