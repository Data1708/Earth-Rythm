name: Update Wind Data

# Fetches NOAA GFS 10m wind data, processes via wgrib2, and commits a
# downsampled JSON wind grid to public/data/wind.json.
#
# Runs daily at 08:00 UTC (one hour after clouds, two after volcanoes —
# staggered to avoid simultaneous commits). GFS publishes 4 forecasts per
# day; we use the most recent reliably-available one.

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install wgrib2
        run: |
          sudo apt-get update
          sudo apt-get install -y wgrib2
          wgrib2 -version

      - name: Run wind update script
        run: node scripts/update-wind.mjs

      - name: Commit and push changes
        run: |
          if [[ -n "$(git status --porcelain public/data/wind.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/wind.json
            git commit -m "chore(data): refresh wind.json [skip ci]"
            git push
            echo "Committed updated wind data"
          else
            echo "No changes to wind.json"
          fi
