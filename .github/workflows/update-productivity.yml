name: Update Ocean Productivity

# This workflow downloads the latest monthly Net Primary Productivity
# composite from OSU's Ocean Productivity server, color-maps it to a
# PNG, and commits the result so the Gaia frontend can serve it from
# /data/productivity.png.
#
# Runs weekly because the source data is monthly and there's no need
# to retry more often. Manual dispatch is also enabled for ad-hoc
# refreshes.

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install HDF4 system library
        # pyhdf wheels need the HDF4 C library available at runtime
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf4-dev libhdf4-0 libhdf4-alt-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyhdf numpy Pillow requests

      - name: Run productivity update
        run: python scripts/update-productivity.py

      - name: Commit updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/productivity.png public/data/productivity.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ocean productivity data [skip ci]"
            git push
          fi
